<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>webdoom</title>
<link rel="stylesheet" href="css/webdoom.css">
</head>
<body>
<main id="stage">
  <canvas id="screen" width="320" height="200" tabindex="0" hidden></canvas>

  <section id="landing"></section>

  <div id="loading" hidden>
    <div id="loading-label"></div>
    <div id="loading-bar"><div id="loading-fill"></div></div>
  </div>

  <div id="countdown" hidden></div>
  <div id="overlay"><div id="status"></div></div>
  <div id="sw-update" hidden>
    New version available — <button onclick="location.reload()">reload</button>
  </div>
</main>
<script type="module" src="js/lobby.js"></script>
</body>
</html>
