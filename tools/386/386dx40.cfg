# 86Box machine configuration: DataExpert 386C @ 40 MHz (386DX-40 profile)
#
# Machine: [OPTi 391] DataExpert 386C
#   internal_name = dataexpert386wb
#   ROM: roms/machines/dataexpert386wb/st0386-wb-ver2-0-618f078c738cb397184464.bin
#   CPU: i386DX at 40 MHz (max_bus = 40,000,000 Hz per machine table)
#   Budget: 40,000,000 / 35 = 1,142,857 cycles/tic  (see docs/feasibility-atlas.md §3.5)
#
# Usage: 86Box -P <vmdir> -R <rompath> [cfg-file]
#   run-386box.sh fills VMDIR and FIFO_BASE before launching.
#
# Serial COM1 is mapped to a UNIX FIFO pair (<fifo_base>.in / <fifo_base>.out).
# The DOS program inside the VM writes icount data to COM1; the host reads
# <fifo_base>.out.  FIFO_BASE is substituted by run-386box.sh before launch.

[Machine]
machine = dataexpert386wb
cpu_family = i386dx
cpu_speed = 40000000
cpu_use_dynarec = 0
mem_size = 4096

[Video]
gfxcard = cga

[Floppy and CD/DVD drives]
fda_type = 0
fdb_type = 0

[Hard disks]
# hdd_01_parameters = 524288000,0,0,0,ide  (set by run-386box.sh)

[Sound]
sound_type = none
opl_type = none
fm_driver = nuked

[Network]
net_type = none

[Ports (COM & LPT)]
lpt1_device = none
serial1_enabled = 1
serial1_device = pipe
serial2_enabled = 0
serial3_enabled = 0
serial4_enabled = 0

[Named Pipe (COM) #1]
path = FIFO_BASE_PLACEHOLDER
mode = 1
reconnect = 0

[Input devices]
mouse_type = none
joystick_type = none
